# Deploy live site when code lands on main.
# Requires repo secret: FIREBASE_SERVICE_ACCOUNT_JUANPMT
# (JSON key for a GCP service account with Firebase Hosting Admin)
# Easiest setup: run `firebase init hosting:github` locally, or see PR notes.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JUANPMT }}
          channelId: live
          projectId: juanpmt
