# Preview channel for every pull request.
# Requires the same secret as the merge workflow: FIREBASE_SERVICE_ACCOUNT_JUANPMT
name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JUANPMT }}
          projectId: juanpmt
